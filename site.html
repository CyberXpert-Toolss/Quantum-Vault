<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>bit-trade | Plataforma de Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
        :root {
            --bg-primary: #0a0b0d; --bg-secondary: #131417; --bg-tertiary: #1a1b1e;
            --accent-green: #22c55e; --accent-red: #ef4444; --accent-blue: #6366f1;
            --accent-purple: #8b5cf6; --border-color: #2b2f36; --gold: #f59e0b;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;background:var(--bg-primary);color:#e2e8f0;
            overflow:hidden;user-select:none;-webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;height:100vh;height:100dvh;
        }
        body::before{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,0.08) 0%,transparent 50%),
                       radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.05) 0%,transparent 50%),
                       radial-gradient(ellipse at 50% 80%,rgba(34,197,94,0.03) 0%,transparent 50%);
            pointer-events:none;z-index:0;
        }
        .mono{font-family:'JetBrains Mono',monospace}
        .custom-scrollbar::-webkit-scrollbar{width:3px}
        .custom-scrollbar::-webkit-scrollbar-track{background:transparent}
        .custom-scrollbar::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:10px}
        .glass{
            background:rgba(19,20,23,0.85);backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);
            box-shadow:0 8px 32px rgba(0,0,0,0.4);
        }
        .glow-green{box-shadow:0 0 20px rgba(34,197,94,0.3),0 0 40px rgba(34,197,94,0.1)}
        .glow-blue{box-shadow:0 0 20px rgba(99,102,241,0.3),0 0 40px rgba(99,102,241,0.1)}
        .input-field{
            background:var(--bg-tertiary);border:2px solid var(--border-color);color:white;
            padding:10px 14px;border-radius:10px;width:100%;outline:none;transition:all 0.3s;
            font-size:14px;-webkit-appearance:none;
        }
        .input-field:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
        .btn-primary{
            background:linear-gradient(135deg,var(--accent-blue) 0%,var(--accent-purple) 100%);
            color:white;padding:12px 20px;border-radius:10px;font-weight:700;transition:all 0.3s;
            position:relative;overflow:hidden;border:none;cursor:pointer;
        }
        .btn-primary:active{transform:scale(0.97)}
        .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .btn-success{
            background:linear-gradient(135deg,#16a34a 0%,#22c55e 100%);
            color:white;padding:12px 20px;border-radius:10px;font-weight:700;
            transition:all 0.3s;border:none;cursor:pointer;
        }
        .btn-success:active{transform:scale(0.97)}
        .loader{border:2px solid rgba(255,255,255,0.2);border-top:2px solid white;border-radius:50%;width:18px;height:18px;animation:spin 0.8s linear infinite}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .timer-badge{
            background:rgba(99,102,241,0.2);color:#a5b4fc;padding:3px 8px;
            border-radius:6px;font-weight:bold;font-size:11px;border:1px solid rgba(99,102,241,0.3);
        }
        .timer-badge.urgent{
            background:rgba(239,68,68,0.3);color:#ffaaaa;
            animation:urgentPulse 0.5s infinite alternate;border-color:rgba(239,68,68,0.5);
        }
        @keyframes urgentPulse{from{transform:scale(1)}to{transform:scale(1.05)}}
        #hud-timer{transition:all 0.3s;pointer-events:none;text-shadow:0 0 20px currentColor}
        .result-overlay{animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
        @keyframes popIn{0%{transform:translate(-50%,-50%) scale(0.3);opacity:0}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
        @keyframes slideDown{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
        .badge-anim{animation:slideDown 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
        @keyframes customBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .arrow-bounce{animation:customBounce 1s infinite ease-in-out}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
        .shake-animation{animation:shake 0.1s infinite}
        .gradient-text{
            background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .gradient-text-green{
            background:linear-gradient(135deg,#22c55e 0%,#10b981 50%,#059669 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        }
        .progress-bar{transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
        .chart-container{
            position:relative;cursor:crosshair;
            background:radial-gradient(ellipse at center,rgba(13,14,18,0.9) 0%,rgba(10,11,13,0.95) 100%);
            border:1px solid rgba(255,255,255,0.05);
        }
        .mode-toggle-btn{transition:all 0.3s;border:none;cursor:pointer}
        .mode-toggle-btn.active{transform:scale(1.03)}
        #toast{transition:all 0.3s;z-index:9999}
        @keyframes confettiFall{0%{transform:translateY(-100%) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
        .confetti-piece{position:fixed;width:8px;height:8px;animation:confettiFall 3s linear forwards;pointer-events:none;z-index:9999}
        .level-up-flash{animation:levelUpFlash 1s ease-out}
        @keyframes levelUpFlash{0%{filter:brightness(2)}100%{filter:brightness(1)}}
        @media (max-width: 767px) {
            .input-field{font-size:16px !important;padding:10px 12px !important}
            .btn-primary,.btn-success{padding:14px 16px !important;font-size:15px !important}
            #exec-btn{padding:16px !important;font-size:17px !important}
            table{font-size:11px !important}
            th,td{padding:8px 6px !important}
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- LOADING SCREEN -->
    <div id="loading-screen" class="fixed inset-0 z-[5000] bg-[#0a0b0d] flex items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 rounded-2xl flex items-center justify-center shadow-2xl" style="animation: float 3s ease-in-out infinite">
                <i data-lucide="bar-chart-2" class="w-7 h-7 text-white"></i>
            </div>
            <div class="loader"></div>
        </div>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 flex items-center justify-center p-4 z-[4000] bg-black/95 backdrop-blur-sm" style="display:none;">
        <div class="w-full max-w-sm p-6 glass rounded-2xl shadow-2xl border border-indigo-500/30 glow-blue">
            <div class="flex flex-col items-center mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 rounded-2xl flex items-center justify-center mb-4 shadow-2xl" style="animation: float 3s ease-in-out infinite">
                    <i data-lucide="bar-chart-2" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight"><span class="gradient-text">bit-trade</span></h1>
                <p class="text-indigo-300/80 text-xs mt-1 font-medium">Plataforma de Trading</p>
            </div>
            <form id="auth-form" class="space-y-4">
                <div id="username-container" class="hidden">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Nome</label>
                    <input type="text" id="auth-username" class="input-field mt-1" placeholder="Seu nome completo">
                </div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">E-mail</label><input type="email" id="auth-email" class="input-field mt-1" placeholder="seu@email.com" required></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Senha</label><input type="password" id="auth-password" class="input-field mt-1" placeholder="••••••••" required></div>
                <button type="submit" id="auth-submit-btn" class="w-full btn-primary py-3 rounded-xl flex items-center justify-center gap-2 mt-4 text-base font-bold"><span>Entrar</span><div id="auth-loader" class="loader hidden"></div></button>
            </form>
            <div class="mt-5 text-center"><button id="toggle-auth" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors font-medium">Não tem conta? Cadastre-se</button></div>
        </div>
    </div>

    <!-- Withdraw Overlay -->
    <div id="withdraw-overlay" class="fixed inset-0 hidden flex items-center justify-center p-4 z-[3000] bg-black/95 backdrop-blur-sm">
        <div class="w-full max-w-sm p-6 glass rounded-2xl shadow-2xl border border-green-500/30 glow-green">
            <div class="flex justify-between items-center mb-5"><h2 class="text-xl font-black gradient-text-green flex items-center gap-2"><i data-lucide="banknote" class="w-6 h-6 text-green-400"></i> Sacar</h2><button onclick="closeWithdrawModal()" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <div class="bg-green-500/10 border-2 border-green-500/30 rounded-xl p-4 mb-5 text-center"><p class="text-gray-400 text-[10px] uppercase font-bold mb-2 tracking-wider">Valor Disponível</p><p class="text-3xl font-black text-green-400 mono" id="withdraw-amount-display">R$ 0,00</p></div>
            <form id="withdraw-form" class="space-y-4">
                <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Nome do Titular</label><input type="text" id="withdraw-nome" class="input-field mt-1" placeholder="Nome no PIX" required></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Chave PIX</label><input type="text" id="withdraw-pix" class="input-field mt-1" placeholder="CPF, Celular ou E-mail" required></div>
                <div class="pt-2"><button type="submit" id="withdraw-submit-btn" class="w-full btn-success py-3 rounded-xl font-bold text-base flex items-center justify-center gap-2"><i data-lucide="check-circle" class="w-4 h-4"></i> Confirmar Saque de <span id="withdraw-btn-val">R$ 0,00</span></button></div>
            </form>
        </div>
    </div>

    <!-- Recovery Modal -->
    <div id="recovery-modal" class="fixed inset-0 hidden flex items-center justify-center p-4 z-[3500] bg-black/95 backdrop-blur-sm">
        <div class="w-full max-w-xs p-6 glass rounded-2xl shadow-2xl border border-yellow-500/30 glow-gold">
            <div class="text-center"><div class="text-5xl mb-3">🎯</div><h2 class="text-xl font-black text-yellow-400 mb-2">Rodada Extra!</h2><p class="text-gray-400 text-sm mb-4">Recupere com <span class="text-yellow-400 font-bold">+50% bônus</span></p><div class="bg-yellow-500/10 border-2 border-yellow-500/30 rounded-xl p-3 mb-5"><p class="text-xs text-gray-400">Custo:</p><p class="text-2xl font-black text-yellow-400 mono">R$ 2,00</p></div><div class="space-y-2"><button onclick="executeRecoveryRound()" class="w-full btn-primary py-3 rounded-xl font-bold">🎰 Girar Rodada Extra</button><button onclick="closeRecoveryModal()" class="w-full py-2 text-gray-400 hover:text-white text-sm">Não, obrigado</button></div></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-container" class="h-full flex flex-col relative z-10" style="display:none;">
        <header class="flex-shrink-0 border-b border-[#2b2f36] bg-[#131417]/95 backdrop-blur-xl z-50 relative">
            <div class="flex items-center justify-between px-3 py-2">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 rounded-lg flex items-center justify-center shadow-lg flex-shrink-0">
                        <i data-lucide="bar-chart-2" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="font-black text-lg tracking-tight"><span class="gradient-text">bit-trade</span></span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[9px] text-gray-500 uppercase font-bold">Saldo</span>
                    <span class="text-sm font-black text-green-400 mono" id="app-balance">R$ 0,00</span>
                </div>
            </div>
            <div class="flex items-center justify-between px-3 pb-2 gap-2">
                <div class="flex items-center gap-2 bg-[#1a1b1e] pl-2 pr-1 py-1.5 rounded-lg border border-[#2b2f36] flex-shrink-0">
                    <div id="asset-icon" class="w-6 h-6 rounded-full flex items-center justify-center text-white flex-shrink-0" style="background-color:#f7931a;"></div>
                    <select onchange="changeAsset(this.value)" class="bg-transparent text-white font-bold outline-none cursor-pointer text-xs appearance-none pr-1 w-20">
                        <option value="BTC" class="bg-[#131417]">BTC/BRL</option>
                        <option value="ETH" class="bg-[#131417]">ETH/BRL</option>
                        <option value="SOL" class="bg-[#131417]">SOL/BRL</option>
                    </select>
                </div>
                <span id="header-price" class="font-bold text-xs text-white mono truncate">345.000,00</span>
                <div class="flex items-center gap-1.5 flex-shrink-0">
                    <span id="level-badge" class="text-[9px] font-bold text-purple-400 bg-purple-500/10 px-1.5 py-0.5 rounded">Nv.1</span>
                    <div class="w-12 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                        <div id="level-progress" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full progress-bar" style="width:10%"></div>
                    </div>
                </div>
                <div class="flex items-center gap-1 flex-shrink-0">
                    <button id="btn-saque-header" onclick="openWithdrawModal()" disabled class="px-2 py-1 bg-green-600/20 text-green-500 text-[9px] font-bold rounded-lg border border-green-500/30 opacity-50 cursor-not-allowed">SACAR</button>
                    <button onclick="handleLogout()" class="p-1 hover:bg-red-500/10 rounded-lg text-gray-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
            <div id="saque-liberado-badge" class="hidden absolute top-full left-1/2 -translate-x-1/2 mt-1 bg-green-500 text-white text-[9px] font-bold px-3 py-1.5 rounded-lg shadow-lg badge-anim whitespace-nowrap z-20 border border-green-400">
                <i data-lucide="check-circle" class="w-3 h-3 inline-block mr-1"></i> Saque Liberado!
            </div>
            <div id="combo-meter" class="hidden absolute top-full right-2 mt-1 px-2 py-1 bg-gradient-to-r from-yellow-500/20 to-orange-500/20 border border-yellow-500/30 rounded-lg text-[9px] font-bold text-yellow-400">
                🔥 <span id="combo-count">0</span>x
            </div>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden">
            <section class="h-[40%] md:h-[55%] flex-shrink-0 relative chart-container border-b border-[#2b2f36]" id="chart-parent">
                <canvas id="main-chart" class="w-full h-full"></canvas>
                <div id="hud-timer" class="absolute top-2 right-2 text-xl font-black font-mono opacity-0 z-20 glass px-3 py-1.5 rounded-xl shadow-xl border border-white/10 text-white">15s</div>
                <div id="hud-result" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 hidden result-overlay z-30 flex flex-col items-center justify-center p-6 rounded-2xl glass border-2 shadow-2xl w-[90%] max-w-xs text-center">
                    <div class="text-5xl mb-2" id="hud-result-emoji">🎉</div>
                    <h1 id="hud-result-title" class="text-xl font-black mb-1 uppercase tracking-wider">VOCÊ RECEBEU!</h1>
                    <p id="hud-result-val" class="text-2xl font-bold mono">+ R$ 0,00</p>
                    <p id="hud-result-bonus" class="text-xs text-yellow-400 mt-1 hidden"></p>
                </div>
                <div id="confetti-container"></div>
            </section>

            <aside class="flex-1 bg-[#0a0b0d] flex flex-col overflow-hidden">
                <div class="p-2 flex-shrink-0 border-b border-[#2b2f36]">
                    <div class="flex gap-1.5 mb-2 p-1 bg-[#1a1b1e] rounded-lg">
                        <button onclick="setMode('buy')" id="mode-buy" class="flex-1 py-2 text-[11px] font-bold rounded-md mode-toggle-btn active bg-green-500 text-white">📈 COMPRA</button>
                        <button onclick="setMode('sell')" id="mode-sell" class="flex-1 py-2 text-[11px] font-bold rounded-md mode-toggle-btn text-gray-400">📉 VENDA</button>
                    </div>
                    <div class="flex gap-2 items-end">
                        <div class="flex-1">
                            <label class="text-[9px] text-gray-500 uppercase font-bold">Valor (R$)</label>
                            <input type="number" id="order-amount" value="10" min="10" class="input-field mt-0.5 mono text-sm" placeholder="Mín R$ 10" style="padding:8px 10px;">
                        </div>
                        <button id="exec-btn" onclick="executeTrade()" class="px-5 py-2 rounded-lg text-white font-black text-sm bg-green-500 active:scale-95 transition-all shadow-lg glow-green flex-shrink-0">COMPRA</button>
                    </div>
                    <div class="grid grid-cols-4 gap-1.5 mt-2">
                        <button onclick="setInvestment(50)" class="py-1.5 bg-[#1a1b1e] rounded-md text-[10px] font-bold text-gray-400 active:bg-gray-700 transition-all">50</button>
                        <button onclick="setInvestment(100)" class="py-1.5 bg-[#1a1b1e] rounded-md text-[10px] font-bold text-gray-400 active:bg-gray-700 transition-all">100</button>
                        <button onclick="setInvestment(500)" class="py-1.5 bg-[#1a1b1e] rounded-md text-[10px] font-bold text-gray-400 active:bg-gray-700 transition-all">500</button>
                        <button onclick="setInvestment(1000)" class="py-1.5 bg-[#1a1b1e] rounded-md text-[10px] font-bold text-gray-400 active:bg-gray-700 transition-all">1k</button>
                    </div>
                </div>
                <div class="flex-1 flex flex-col overflow-hidden">
                    <div class="px-3 py-2 border-b border-[#2b2f36] bg-[#0a0b0d]">
                        <span class="text-[10px] font-bold text-indigo-400 uppercase">Operações</span>
                    </div>
                    <div class="flex-1 overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left text-[10px]">
                            <thead class="text-gray-500 sticky top-0 bg-[#0d0e12] z-10">
                                <tr><th class="p-2">Lado</th><th class="p-2 text-center">Tempo</th><th class="p-2 text-right">Resultado</th></tr>
                            </thead>
                            <tbody id="positions-list"></tbody>
                        </table>
                        <div id="no-trades-msg" class="p-4 text-center text-gray-600 text-[10px] italic">
                            <i data-lucide="activity" class="w-6 h-6 mx-auto mb-1 opacity-50"></i>
                            <p>Sem operações</p>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 translate-y-20 transition-all duration-300 z-[5000] glass px-4 py-2.5 rounded-full flex items-center gap-2 shadow-2xl border border-white/10 max-w-[90%]">
        <i data-lucide="info" class="w-4 h-4 text-white flex-shrink-0" id="toast-icon"></i>
        <span class="text-xs font-bold text-white truncate" id="toast-text"></span>
    </div>
    <div id="social-toast" class="fixed top-2 right-2 translate-x-full transition-all duration-300 z-[4500] glass px-3 py-2 rounded-full flex items-center gap-2 shadow-xl border border-yellow-500/30 text-xs">
        <span>💸</span><span id="social-toast-text" class="font-bold text-yellow-400 text-[10px]"></span>
    </div>

    <script>
        const supabaseUrl='https://wlrclbwjqmnzgabiurmr.supabase.co';
        const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndscmNsYndqcW1uemdhYml1cm1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTU0MDMsImV4cCI6MjA5NDI5MTQwM30.-0LQBgpjjYuV7hnRiIXNMCJ9GIJrYWd7pABgcPtGfPM';
        const _supabase=supabase.createClient(supabaseUrl,supabaseKey);
        let currentUser=null,dbData=null,isRegistering=false;
        let consecutiveWins=0,previousModo=null,saqueAlertTimeout=null,currentSaqueLiberado=false;
        let lastTradeWasLoss=false,level=1,levelProgress=0,marketBonusActive=false,marketBonusTimer=120;
        let socialProofInterval=null,isFirstTrade=true,isLoggingOut=false,initialLoad=true,highestLevelEver=1;
        const ASSET_PRICES={BTC:345000,ETH:18500,SOL:850};
        let activeAsset='BTC',currentPrice=ASSET_PRICES.BTC,currentMode='buy';
        let activeTrades=[],completedTrades=[],chartData=[];
        let blockedCheckInterval=null,marketTimerInterval=null,loyaltyBonusInterval=null,btcCycle=0,btcTicks=0;
        const ASSET_COLORS={BTC:'#f7931a',ETH:'#627EEA',SOL:'#14F195'};
        const ASSET_ICONS={

            else{consecutiveWins=0;localStorage.removeItem('bit_wins');document.getElementById('combo-meter').classList.add('hidden');const perdaPct=getPerdaPct(),valorPerdido=t.amount*perdaPct,valorRecuperado=t.amount-valorPerdido;const novoSaldo=parseFloat(dbData.saldo)+valorRecuperado;await updateBalanceInDB(novoSaldo);showResultHud(false,valorPerdido.toFixed(2));showToast(`❌ -R$ ${valorPerdido.toFixed(2)}`,'error');playLossSound();completedTrades.unshift({...t,result:'LOSS',finalPnl:-valorPerdido});if(valorPerdido<t.amount*0.05)setTimeout(()=>showToast("😱 POR POUCO!",'info'),500);if(parseFloat(dbData.saldo)>=2&&dbData.modo!=='superperda'&&Math.random()<0.3){lastTradeWasLoss=true;setTimeout(showRecoveryModal,2000)}}
            if(completedTrades.length>5)completedTrades.pop();activeTrades.splice(idx,1);renderActiveTrades()}
        function renderActiveTrades(){const list=document.getElementById('positions-list'),msg=document.getElementById('no-trades-msg');let html='';html+=activeTrades.map(t=>{const cp=ASSET_PRICES[t.asset],pnl=calculateLivePnL(t,cp),iw=pnl>=0;return`<tr class="border-b border-[#1a1b1e] hover:bg-white/5 transition-all bg-indigo-500/5"><td class="p-2"><span class="${t.side==='BUY'?'text-green-500':'text-red-500'} font-bold text-[10px]">${t.side}</span></td><td class="p-2 text-center"><span class="${t.timeLeft<=5?'timer-badge urgent':'timer-badge'}">${t.timeLeft}s</span></td><td class="p-2 text-right mono font-bold text-[10px] ${iw?'text-green-400':'text-red-400'}">${iw?'+':''}R$ ${pnl.toFixed(2)}</td></tr>`}).join('');html+=completedTrades.map(t=>{const iw=t.finalPnl>=0;return`<tr class="border-b border-[#1a1b1e] opacity-70 ${iw?'bg-green-500/5':'bg-red-500/5'}"><td class="p-2"><span class="${iw?'text-green-500':'text-red-500'} font-bold text-[10px]">${t.side}</span></td><td class="p-2 text-center"><span class="${iw?'text-green-500':'text-red-500'} text-[9px]">Fim</span></td><td class="p-2 text-right mono font-bold text-[10px] ${iw?'text-green-500':'text-red-500'}">${iw?'+':''}R$ ${Math.abs(t.finalPnl).toFixed(2)}</td></tr>`}).join('');if(html===''){msg.classList.remove('hidden');list.innerHTML=""}else{msg.classList.add('hidden');list.innerHTML=html}}
        let canvas,ctx;
        function initChart(){canvas=document.getElementById('main-chart');if(!canvas)return;ctx=canvas.getContext('2d');initChartData();window.addEventListener('resize',resizeCanvas);resizeCanvas();requestAnimationFrame(renderLoop)}
        function initChartData(){let last=currentPrice;for(let i=0;i<40;i++){const c=generateCandle(last);chartData.push(c);last=c.close}}
        function resizeCanvas(){const p=document.getElementById('chart-parent');if(!p||!canvas)return;canvas.width=p.clientWidth;canvas.height=p.clientHeight}
        function generateCandle(pc){let v=30;if(activeAsset==='SOL')v=15;else if(activeAsset==='ETH')v=3;const o=pc,c=o+(Math.random()-0.49)*v;return{open:o,close:c,high:Math.max(o,c)+Math.random()*(v/2),low:Math.min(o,c)-Math.random()*(v/2),time:Date.now()}}
        function draw(){if(!ctx||chartData.length===0)return;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=1;for(let i=0;i<canvas.width;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke()}for(let i=0;i<canvas.height;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke()}const im=canvas.width<500,step=im?10:12,cw=im?6:8,pr=im?35:50;const min=Math.min(...chartData.map(d=>d.low))*0.999,max=Math.max(...chartData.map(d=>d.high))*1.001,range=max-min;const gy=(p)=>canvas.height-((p-min)/range*canvas.height*0.75)-(canvas.height*0.12);ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;for(let i=0;i<5;i++){const y=gy(min+(range/5)*i);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}chartData.forEach((c,i)=>{const x=canvas.width-(chartData.length-i)*step-pr;if(x<-50||x>canvas.width+30)return;const ig=c.close>=c.open;ctx.fillStyle=ctx.strokeStyle=ig?'#22c55e':'#ef4444';ctx.shadowColor=ig?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)';ctx.shadowBlur=3;ctx.beginPath();ctx.moveTo(x+cw/2,gy(c.high));ctx.lineTo(x+cw/2,gy(c.low));ctx.stroke();ctx.fillRect(x,gy(Math.max(c.open,c.close)),cw,Math.max(1,Math.abs(gy(c.open)-gy(c.close))));ctx.shadowBlur=0});activeTrades.forEach(t=>{if(t.asset===activeAsset){const ty=gy(t.entryPrice),ib=t.side==='BUY',col=ib?'#22c55e':'#ef4444';ctx.setLineDash([3,3]);ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.globalAlpha=0.4;ctx.beginPath();ctx.moveTo(0,ty);ctx.lineTo(canvas.width,ty);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(8,ty-12,90,22,6);ctx.fill();ctx.fillStyle='white';ctx.font='bold 10px JetBrains Mono';ctx.fillText(`${t.side} R$${t.entryPrice.toFixed(0)}`,12,ty+4)}});const ly=gy(currentPrice);ctx.strokeStyle='#6366f1';ctx.setLineDash([3,3]);ctx.lineWidth=1.5;ctx.shadowColor='rgba(99,102,241,0.5)';ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(canvas.width,ly);ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;const lw=im?80:110;ctx.fillStyle='#6366f1';ctx.beginPath();ctx.roundRect(canvas.width-lw,ly-12,lw,22,6);ctx.fill();ctx.fillStyle='white';ctx.font=im?'bold 10px JetBrains Mono':'bold 11px JetBrains Mono';ctx.fillText('R$ '+currentPrice.toFixed(2),canvas.width-(lw-6),ly+4)}
        function renderLoop(){draw();requestAnimationFrame(renderLoop)}
        function startSim(){setInterval(()=>{for(let key in ASSET_PRICES){let vol,bias=0;const at=activeTrades.find(t=>t.asset===key);if(key==='BTC'){vol=30;btcTicks++;if(btcTicks>40){btcCycle=(btcCycle+1)%3;btcTicks=0}if(btcCycle===0)bias=vol*0.15;else if(btcCycle===2)bias=-vol*0.15}else if(key==='ETH'){vol=4;bias=0}else if(key==='SOL'){vol=15;if(Math.random()<0.1)bias=(Math.random()-0.5)*vol*5}if(at&&at.timeLeft<=3){const ib=at.side==='BUY',sgu=(ib&&at.willWin)||(!ib&&!at.willWin);bias=sgu?vol*0.2:-vol*0.2}ASSET_PRICES[key]+=(Math.random()-0.5)*(vol*0.6)+bias}currentPrice=ASSET_PRICES[activeAsset];const pe=document.getElementById('header-price');if(pe)pe.innerText=currentPrice.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});const last=chartData[chartData.length-1];if(last){last.close=currentPrice;if(currentPrice>last.high)last.high=currentPrice;if(currentPrice<last.low)last.low=currentPrice;if(Date.now()-last.time>3000){chartData.push(generateCandle(currentPrice));if(chartData.length>80)chartData.shift()}}if(activeTrades.length>0)renderActiveTrades()},300)}
        function showToast(msg,type='info'){const t=document.getElementById('toast'),txt=document.getElementById('toast-text'),icon=document.getElementById('toast-icon');if(t&&txt&&icon){txt.innerText=msg;if(type==='success'){icon.setAttribute('data-lucide','check-circle');t.style.backgroundColor='#16a34a';t.style.borderColor='#22c55e'}else if(type==='error'){icon.setAttribute('data-lucide','alert-circle');t.style.backgroundColor='#dc2626';t.style.borderColor='#ef4444'}else{icon.setAttribute('data-lucide','info');t.style.backgroundColor='#6366f1';t.style.borderColor='#8b5cf6'}lucide.createIcons();t.classList.remove('translate-y-20');setTimeout(()=>t.classList.add('translate-y-20'),3000)}}
        checkExistingSession();lucide.createIcons();
    </script>
